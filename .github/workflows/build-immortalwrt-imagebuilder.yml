name: Build ImmortalWRT ImageBuilder x86_64 EFI

on:
  workflow_dispatch:
  # Optional: enable scheduled build later
  # schedule:
  #   - cron: '0 3 * * 0'

env:
  # Core build target settings
  IMMORTALWRT_VERSION: "24.10.2"
  TARGET: "x86"
  SUBTARGET: "64"
  PROFILE: "generic"

  # If empty, workflow auto-generates URL from IMMORTALWRT_VERSION/TARGET/SUBTARGET
  IMAGEBUILDER_URL: ""
  # Fallback mirrors used only when IMAGEBUILDER_URL is empty and primary URL fails.
  IMAGEBUILDER_FALLBACK_BASE_URLS: "https://mirrors.sjtug.sjtu.edu.cn/immortalwrt https://mirrors.nju.edu.cn/immortalwrt https://mirrors.ustc.edu.cn/immortalwrt"

  # Base packages from default feeds. Add more packages here when needed.
  BASE_PACKAGES: "luci luci-app-wechatpush"

  # Extra packages. nikki/luci-app-nikki are third-party feed packages,
  # so feed integration must be completed before make image.
  EXTRA_PACKAGES: "nikki luci-app-nikki"

  # Nikki third-party feed settings
  NIKKI_FEED_NAME: "nikki"
  NIKKI_FEED_URL: "https://nikkinikki.pages.dev"

  # Artifact/output settings
  ARTIFACT_NAME: "immortalwrt-x86_64-efi"
  ARTIFACT_RETENTION_DAYS: "7"
  OUTPUT_DIR: "${{ github.workspace }}/output"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zstd xz-utils

      - name: Show build variables
        shell: bash
        run: |
          set -euo pipefail
          echo "IMMORTALWRT_VERSION=${IMMORTALWRT_VERSION}"
          echo "TARGET=${TARGET}"
          echo "SUBTARGET=${SUBTARGET}"
          echo "PROFILE=${PROFILE}"
          echo "IMAGEBUILDER_URL=${IMAGEBUILDER_URL:-<auto>}"
          echo "IMAGEBUILDER_FALLBACK_BASE_URLS=${IMAGEBUILDER_FALLBACK_BASE_URLS}"
          echo "BASE_PACKAGES=${BASE_PACKAGES}"
          echo "EXTRA_PACKAGES=${EXTRA_PACKAGES}"
          echo "NIKKI_FEED_NAME=${NIKKI_FEED_NAME}"
          echo "NIKKI_FEED_URL=${NIKKI_FEED_URL}"
          echo "OUTPUT_DIR=${OUTPUT_DIR}"

      - name: Resolve ImageBuilder URL and Nikki feed path
        shell: bash
        run: |
          set -euo pipefail

          CANDIDATES=()
          if [ -n "${IMAGEBUILDER_URL}" ]; then
            CANDIDATES+=("${IMAGEBUILDER_URL}")
          else
            IB_REL_PATH="releases/${IMMORTALWRT_VERSION}/targets/${TARGET}/${SUBTARGET}/immortalwrt-imagebuilder-${IMMORTALWRT_VERSION}-${TARGET}-${SUBTARGET}.Linux-x86_64.tar.zst"
            CANDIDATES+=("https://downloads.immortalwrt.org/${IB_REL_PATH}")
            for base in ${IMAGEBUILDER_FALLBACK_BASE_URLS}; do
              CANDIDATES+=("${base%/}/${IB_REL_PATH}")
            done
          fi

          FIRST_URL="${CANDIDATES[0]}"
          IB_ARCHIVE_NAME="${FIRST_URL##*/}"
          IB_CANDIDATE_FILE="${RUNNER_TEMP}/ib-candidate-urls.txt"
          printf '%s\n' "${CANDIDATES[@]}" > "${IB_CANDIDATE_FILE}"

          NIKKI_FEED_BRANCH="openwrt-${IMMORTALWRT_VERSION%.*}"
          NIKKI_FEED_ARCH="x86_64"
          NIKKI_FEED_FULL_URL="${NIKKI_FEED_URL}/${NIKKI_FEED_BRANCH}/${NIKKI_FEED_ARCH}/${NIKKI_FEED_NAME}"

          echo "IB_ARCHIVE_NAME=${IB_ARCHIVE_NAME}" >> "${GITHUB_ENV}"
          echo "IB_CANDIDATE_FILE=${IB_CANDIDATE_FILE}" >> "${GITHUB_ENV}"
          echo "NIKKI_FEED_BRANCH=${NIKKI_FEED_BRANCH}" >> "${GITHUB_ENV}"
          echo "NIKKI_FEED_ARCH=${NIKKI_FEED_ARCH}" >> "${GITHUB_ENV}"
          echo "NIKKI_FEED_FULL_URL=${NIKKI_FEED_FULL_URL}" >> "${GITHUB_ENV}"

          echo "Resolved ImageBuilder candidate URLs:"
          nl -ba "${IB_CANDIDATE_FILE}"
          echo "Resolved NIKKI_FEED_FULL_URL=${NIKKI_FEED_FULL_URL}"

      - name: Download ImageBuilder archive
        shell: bash
        run: |
          set -euo pipefail
          TARGET_FILE="${RUNNER_TEMP}/${IB_ARCHIVE_NAME}"
          rm -f "${TARGET_FILE}"
          DOWNLOADED=0

          while IFS= read -r CANDIDATE_URL; do
            [ -z "${CANDIDATE_URL}" ] && continue
            echo "Trying ImageBuilder URL: ${CANDIDATE_URL}"
            if curl -fL --retry 2 --retry-delay 3 --retry-all-errors --connect-timeout 15 --max-time 1200 "${CANDIDATE_URL}" -o "${TARGET_FILE}"; then
              if [ -s "${TARGET_FILE}" ]; then
                echo "ImageBuilder download succeeded: ${CANDIDATE_URL}"
                echo "IB_URL_USED=${CANDIDATE_URL}" >> "${GITHUB_ENV}"
                if [[ "${CANDIDATE_URL}" == *"/releases/"* ]]; then
                  IB_REPO_BASE_URL="${CANDIDATE_URL%%/releases/*}"
                else
                  IB_REPO_BASE_URL="https://downloads.immortalwrt.org"
                fi
                echo "IB_REPO_BASE_URL=${IB_REPO_BASE_URL}" >> "${GITHUB_ENV}"
                DOWNLOADED=1
                break
              fi
            fi
            echo "Download failed for: ${CANDIDATE_URL}"
            rm -f "${TARGET_FILE}"
          done < "${IB_CANDIDATE_FILE}"

          if [ "${DOWNLOADED}" -ne 1 ]; then
            echo "ERROR: ImageBuilder download failed for all candidate URLs." >&2
            exit 1
          fi

          echo "Using package repository base: ${IB_REPO_BASE_URL}"
          ls -lh "${TARGET_FILE}"

      - name: Extract ImageBuilder archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/ib"

          case "${IB_ARCHIVE_NAME}" in
            *.tar.zst)
              tar --zstd -xf "${RUNNER_TEMP}/${IB_ARCHIVE_NAME}" -C "${RUNNER_TEMP}/ib"
              ;;
            *.tar.xz)
              tar -xJf "${RUNNER_TEMP}/${IB_ARCHIVE_NAME}" -C "${RUNNER_TEMP}/ib"
              ;;
            *)
              echo "ERROR: Unsupported ImageBuilder archive format: ${IB_ARCHIVE_NAME}" >&2
              exit 1
              ;;
          esac

          echo "Extracted content:"
          ls -la "${RUNNER_TEMP}/ib"

          IB_DIR="$(find "${RUNNER_TEMP}/ib" -mindepth 1 -maxdepth 1 -type d -name 'immortalwrt-imagebuilder-*' | head -n 1)"
          if [ -z "${IB_DIR}" ]; then
            echo "ERROR: Cannot locate extracted ImageBuilder directory." >&2
            exit 1
          fi

          echo "IB_DIR=${IB_DIR}" >> "${GITHUB_ENV}"
          echo "Using IB_DIR=${IB_DIR}"

      - name: Configure Nikki third-party feed (before build)
        shell: bash
        run: |
          set -euo pipefail
          cd "${IB_DIR}"

          echo "--- Before feed update: repositories.conf ---"
          if [ -f repositories.conf ]; then
            sed -n '1,200p' repositories.conf
          else
            echo "repositories.conf not found, creating a new one."
            touch repositories.conf
          fi

          FEED_LINE="src/gz ${NIKKI_FEED_NAME} ${NIKKI_FEED_FULL_URL}"
          if ! grep -Eq "^src/gz[[:space:]]+${NIKKI_FEED_NAME}[[:space:]]+" repositories.conf; then
            echo "${FEED_LINE}" >> repositories.conf
            echo "Added feed line: ${FEED_LINE}"
          else
            echo "Feed ${NIKKI_FEED_NAME} already exists in repositories.conf"
          fi

          # Keep package source host consistent with the mirror used for ImageBuilder archive.
          if [ -n "${IB_REPO_BASE_URL:-}" ]; then
            sed -i "s#https://downloads\\.immortalwrt\\.org#${IB_REPO_BASE_URL}#g" repositories.conf
          fi

          if [ -f repositories ]; then
            if [ -n "${IB_REPO_BASE_URL:-}" ]; then
              sed -i "s#https://downloads\\.immortalwrt\\.org#${IB_REPO_BASE_URL}#g" repositories
            fi
            if ! grep -Fq "${NIKKI_FEED_FULL_URL}" repositories; then
              echo "${NIKKI_FEED_FULL_URL}" >> repositories
              echo "Added APK-style repo URL to repositories"
            else
              echo "APK-style repositories already contain Nikki URL"
            fi
          else
            echo "repositories file not found, skip APK-style repo append"
          fi

          mkdir -p keys
          NIKKI_KEY_TMP="${RUNNER_TEMP}/${NIKKI_FEED_NAME}-key-build.pub"
          curl -fL --retry 3 --retry-delay 5 --retry-all-errors "${NIKKI_FEED_URL}/key-build.pub" -o "${NIKKI_KEY_TMP}"
          if [ ! -s "${NIKKI_KEY_TMP}" ]; then
            echo "ERROR: Failed to download Nikki feed signing key." >&2
            exit 1
          fi

          if ! grep -q '^untrusted comment:' "${NIKKI_KEY_TMP}"; then
            echo "ERROR: Nikki key format invalid (expected usign public key)." >&2
            echo "Downloaded content head:"
            sed -n '1,5p' "${NIKKI_KEY_TMP}"
            exit 1
          fi

          # ImageBuilder opkg signature verification requires opkg-key add, not plain copy.
          if [ -x "./scripts/opkg-key" ]; then
            OPKG_KEYS="${PWD}/keys" ./scripts/opkg-key add "${NIKKI_KEY_TMP}"
          else
            cp -f "${NIKKI_KEY_TMP}" "keys/${NIKKI_FEED_NAME}.pub"
          fi

          echo "Current ImageBuilder keys:"
          ls -lah keys

          echo "Checking Nikki Packages index: ${NIKKI_FEED_FULL_URL}/Packages.gz"
          curl -fI "${NIKKI_FEED_FULL_URL}/Packages.gz"

          echo "--- After feed update: repositories.conf ---"
          sed -n '1,200p' repositories.conf

      - name: Bootstrap local package index placeholders
        shell: bash
        run: |
          set -euo pipefail
          cd "${IB_DIR}"

          # Some ImmortalWRT ImageBuilder releases ship packages/Packages but no
          # packages/Packages.gz. If Packages.gz is missing, make package_reload
          # triggers package_index, and that may fail in CI due local signing flow.
          mkdir -p packages
          if [ ! -f packages/Packages ]; then
            : > packages/Packages
          fi
          if [ ! -f packages/Packages.gz ]; then
            gzip -9nc packages/Packages > packages/Packages.gz
          fi
          ls -lah packages

      - name: Confirm Nikki packages are visible in feed metadata
        shell: bash
        run: |
          set -euo pipefail
          NIKKI_PACKAGES_GZ="${RUNNER_TEMP}/nikki-Packages.gz"
          NIKKI_PACKAGES_TXT="${RUNNER_TEMP}/nikki-Packages.txt"

          curl -fL --retry 3 --retry-delay 3 --retry-all-errors "${NIKKI_FEED_FULL_URL}/Packages.gz" -o "${NIKKI_PACKAGES_GZ}"
          gzip -dc "${NIKKI_PACKAGES_GZ}" > "${NIKKI_PACKAGES_TXT}"

          echo "Feed metadata sample:"
          sed -n '1,60p' "${NIKKI_PACKAGES_TXT}"

          if ! grep -Eq '^Package:[[:space:]]+nikki$' "${NIKKI_PACKAGES_TXT}"; then
            echo "ERROR: package 'nikki' not found in Nikki feed metadata." >&2
            exit 1
          fi

          if ! grep -Eq '^Package:[[:space:]]+luci-app-nikki$' "${NIKKI_PACKAGES_TXT}"; then
            echo "ERROR: package 'luci-app-nikki' not found in Nikki feed metadata." >&2
            exit 1
          fi

          echo "Confirmed: nikki and luci-app-nikki exist in Nikki feed metadata"

      - name: Build custom firmware image
        shell: bash
        run: |
          set -euo pipefail
          cd "${IB_DIR}"
          mkdir -p "${OUTPUT_DIR}"

          echo "Running ImageBuilder make image..."
          make image \
            PROFILE="${PROFILE}" \
            PACKAGES="${BASE_PACKAGES} ${EXTRA_PACKAGES}" \
            BIN_DIR="${OUTPUT_DIR}" \
            V=s

      - name: Verify output image
        shell: bash
        run: |
          set -euo pipefail

          echo "Listing output directory: ${OUTPUT_DIR}"
          ls -lah "${OUTPUT_DIR}"

          find "${OUTPUT_DIR}" -maxdepth 1 -type f -name '*generic-squashfs-combined-efi.img.gz' | tee "${RUNNER_TEMP}/matched-images.txt"

          if [ ! -s "${RUNNER_TEMP}/matched-images.txt" ]; then
            echo "ERROR: No image matched '*generic-squashfs-combined-efi.img.gz'." >&2
            exit 1
          fi

      - name: Prepare artifact payload
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT_DIR="${RUNNER_TEMP}/artifact-payload"
          mkdir -p "${ARTIFACT_DIR}"

          while IFS= read -r img; do
            cp -v "${img}" "${ARTIFACT_DIR}/"
          done < "${RUNNER_TEMP}/matched-images.txt"

          if [ -f "${OUTPUT_DIR}/sha256sums" ]; then
            cp -v "${OUTPUT_DIR}/sha256sums" "${ARTIFACT_DIR}/"
          fi

          echo "Artifact payload:"
          ls -lah "${ARTIFACT_DIR}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifact-payload/*
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error
